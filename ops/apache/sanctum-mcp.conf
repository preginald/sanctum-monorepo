<VirtualHost *:80>
    ServerName mcp.digitalsanctum.com.au
    ServerAdmin engineering@digitalsanctum.com.au

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8100/
    ProxyPassReverse / http://127.0.0.1:8100/

    ErrorLog ${APACHE_LOG_DIR}/sanctum-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/sanctum-mcp-access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =mcp.digitalsanctum.com.au
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
