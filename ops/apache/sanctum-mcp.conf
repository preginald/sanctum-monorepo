<VirtualHost *:80>
    ServerName mcp.digitalsanctum.com.au
    ServerAdmin engineering@digitalsanctum.com.au

    # --- MCP transport stability (#713) ---
    # Raise proxy timeout to 2 hours (default 300s causes session drops)
    ProxyTimeout 7200
    # Keep upstream connections alive between requests
    SetEnv proxy-initial-not-pooled 1
    ProxyPass / http://127.0.0.1:8100/ keepalive=On
    ProxyPassReverse / http://127.0.0.1:8100/
    ProxyPreserveHost On

    # Disable response buffering for streaming/SSE responses
    SetEnv proxy-sendchunked 1

    ErrorLog ${APACHE_LOG_DIR}/sanctum-mcp-error.log
    CustomLog ${APACHE_LOG_DIR}/sanctum-mcp-access.log combined

    RewriteEngine On
    RewriteCond %{SERVER_NAME} =mcp.digitalsanctum.com.au
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
