<VirtualHost *:80>
    ServerName test.digitalsanctum.com.au
    ServerAdmin engineering@digitalsanctum.com.au

    # --- 1. THE REVERSE PROXY (API) ---
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8001/
    ProxyPassReverse /api/ http://127.0.0.1:8001/

    # --- 2. THE FRONTEND (React) ---
    DocumentRoot /var/www/sanctum-core-test
    <Directory /var/www/sanctum-core-test>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted

        # React Router Rewrites
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule . /index.html [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/sanctum-test-error.log
    CustomLog ${APACHE_LOG_DIR}/sanctum-test-access.log combined
RewriteCond %{SERVER_NAME} =test.digitalsanctum.com.au
RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
