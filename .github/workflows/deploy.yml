name: Sanctum Core Deploy

on:
  push:
    branches: [ "main", "test" ]

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. STOP ON ERROR
            set -e

            # 2. PULL LATEST CODE
            echo "📥 Pulling latest code..."
            cd ~/DigitalSanctum
            OLD_COMMIT=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main

            # 2.5 DETERMINE CHANGED DIRECTORIES
            RESTART_API=false
            RESTART_MCP=false
            if git cat-file -t "$OLD_COMMIT" > /dev/null 2>&1; then
                CHANGED_FILES=$(git diff --name-only "$OLD_COMMIT" HEAD)
                echo "📋 Changed files since last deploy:"
                echo "$CHANGED_FILES"
                if echo "$CHANGED_FILES" | grep -q '^sanctum-core/'; then
                    RESTART_API=true
                fi
                if echo "$CHANGED_FILES" | grep -q '^sanctum-mcp/'; then
                    RESTART_MCP=true
                fi
            else
                echo "⚠️ Previous commit not found — restarting all services"
                RESTART_API=true
                RESTART_MCP=true
            fi

            # 3. UPDATE BACKEND
            echo "🐍 Updating Backend..."
            cd sanctum-core
            source venv/bin/activate
            pip install -r requirements.txt

            # 3.5 RUN DATABASE MIGRATIONS (NEW)
            echo "🏗️ Running Database Migrations..."
            alembic upgrade head

            # Conditional service restarts (#764)
            if [ "$RESTART_API" = true ]; then
                echo "🔄 Restarting sanctum-api (sanctum-core/ changed)..."
                sudo systemctl restart sanctum-api
            else
                echo "⏭️ Skipping sanctum-api restart (no sanctum-core/ changes)"
            fi
            if [ "$RESTART_MCP" = true ]; then
                echo "🔄 Restarting sanctum-mcp (sanctum-mcp/ changed)..."
                sudo systemctl restart sanctum-mcp
            else
                echo "⏭️ Skipping sanctum-mcp restart (no sanctum-mcp/ changes)"
            fi

            # 3.7 SYNC APACHE CONFIGS (#715)
            echo "🔧 Checking Apache configs..."
            cd ~/DigitalSanctum
            set +e
            APACHE_CHANGED=false
            for conf in ops/apache/*.conf; do
              fname=$(basename "$conf")
              if ! diff -q "$conf" "/etc/apache2/sites-available/$fname" > /dev/null 2>&1; then
                echo "  → Updating $fname"
                sudo cp "$conf" "/etc/apache2/sites-available/$fname"
                APACHE_CHANGED=true
              fi
            done
            if [ "$APACHE_CHANGED" = true ]; then
              echo "  → Validating Apache config..."
              if sudo apache2ctl configtest 2>&1; then
                sudo systemctl reload apache2
                echo "  ✓ Apache reloaded"
              else
                echo "  ⚠ Apache configtest failed — skipping reload"
              fi
            else
              echo "  ✓ No Apache config changes"
            fi
            set -e

            # 4. UPDATE FRONTEND
            echo "⚛️ Building Frontend..."
            cd ~/DigitalSanctum/sanctum-web
            npm install
            npm run build

            # Copy Files (No Sudo needed due to chown)
            echo "🚀 Deploying Static Assets..."
            cp -r dist/* /var/www/sanctum-core/

            # Version verification (#1106)
            echo "--- Verifying API version ---"
            cd ~/DigitalSanctum
            DEPLOYED_COMMIT=$(git rev-parse HEAD)
            RUNNING_COMMIT=""
            for i in 1 2 3 4 5; do
              RUNNING_COMMIT=$(curl -sf http://127.0.0.1:8000/version 2>/dev/null | jq -r '.commit // empty') || true
              if [ -n "$RUNNING_COMMIT" ]; then break; fi
              echo "Attempt $i: API not ready, retrying in 2s..."
              sleep 2
            done

            if [ "$RUNNING_COMMIT" != "$DEPLOYED_COMMIT" ]; then
              echo "Version mismatch: running=$RUNNING_COMMIT deployed=$DEPLOYED_COMMIT"
              echo "Forcing API restart..."
              sudo systemctl restart sanctum-api
              sleep 3
              RUNNING_COMMIT=$(curl -sf http://127.0.0.1:8000/version | jq -r '.commit // empty') || true
              if [ "$RUNNING_COMMIT" != "$DEPLOYED_COMMIT" ]; then
                echo "FATAL: API still serving stale commit after restart"
                exit 1
              fi
              echo "API restarted successfully: $RUNNING_COMMIT"
            else
              echo "API version matches: $RUNNING_COMMIT"
            fi

            echo "✅ Deployment Complete."

  deploy-test:
    if: github.ref == 'refs/heads/test'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy test via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. STOP ON ERROR
            set -e

            # 2. PULL LATEST CODE
            echo "📥 Pulling latest test code..."
            cd ~/DigitalSanctum-test
            OLD_COMMIT=$(git rev-parse HEAD)
            git fetch origin test
            git reset --hard origin/test

            # 2.5 DETERMINE CHANGED DIRECTORIES
            RESTART_API=false
            if git cat-file -t "$OLD_COMMIT" > /dev/null 2>&1; then
                CHANGED_FILES=$(git diff --name-only "$OLD_COMMIT" HEAD)
                echo "📋 Changed files since last deploy:"
                echo "$CHANGED_FILES"
                if echo "$CHANGED_FILES" | grep -q '^sanctum-core/'; then
                    RESTART_API=true
                fi
            else
                echo "⚠️ Previous commit not found — restarting all services"
                RESTART_API=true
            fi

            # 3. UPDATE BACKEND (no migrations — only main runs migrations)
            echo "🐍 Updating Backend..."
            cd sanctum-core
            source venv/bin/activate
            pip install -r requirements.txt

            # Conditional service restart (#764)
            if [ "$RESTART_API" = true ]; then
                echo "🔄 Restarting sanctum-api-test (sanctum-core/ changed)..."
                sudo systemctl restart sanctum-api-test
            else
                echo "⏭️ Skipping sanctum-api-test restart (no sanctum-core/ changes)"
            fi

            # 3.7 SYNC APACHE CONFIGS
            echo "🔧 Checking Apache configs..."
            cd ~/DigitalSanctum-test
            set +e
            APACHE_CHANGED=false
            for conf in ops/apache/*.conf; do
              fname=$(basename "$conf")
              if ! diff -q "$conf" "/etc/apache2/sites-available/$fname" > /dev/null 2>&1; then
                echo "  → Updating $fname"
                sudo cp "$conf" "/etc/apache2/sites-available/$fname"
                APACHE_CHANGED=true
              fi
            done
            if [ "$APACHE_CHANGED" = true ]; then
              echo "  → Validating Apache config..."
              if sudo apache2ctl configtest 2>&1; then
                sudo systemctl reload apache2
                echo "  ✓ Apache reloaded"
              else
                echo "  ⚠ Apache configtest failed — skipping reload"
              fi
            else
              echo "  ✓ No Apache config changes"
            fi
            set -e

            # 4. UPDATE FRONTEND
            echo "⚛️ Building Frontend..."
            cd ~/DigitalSanctum-test/sanctum-web
            npm install
            npm run build

            # Deploy static assets
            echo "🚀 Deploying Static Assets..."
            cp -r dist/* /var/www/sanctum-core-test/

            # Version verification (#1106)
            echo "--- Verifying API version ---"
            cd ~/DigitalSanctum-test
            DEPLOYED_COMMIT=$(git rev-parse HEAD)
            RUNNING_COMMIT=""
            for i in 1 2 3 4 5; do
              RUNNING_COMMIT=$(curl -sf http://127.0.0.1:8001/version 2>/dev/null | jq -r '.commit // empty') || true
              if [ -n "$RUNNING_COMMIT" ]; then break; fi
              echo "Attempt $i: API not ready, retrying in 2s..."
              sleep 2
            done

            if [ "$RUNNING_COMMIT" != "$DEPLOYED_COMMIT" ]; then
              echo "Version mismatch: running=$RUNNING_COMMIT deployed=$DEPLOYED_COMMIT"
              echo "Forcing API restart..."
              sudo systemctl restart sanctum-api-test
              sleep 3
              RUNNING_COMMIT=$(curl -sf http://127.0.0.1:8001/version | jq -r '.commit // empty') || true
              if [ "$RUNNING_COMMIT" != "$DEPLOYED_COMMIT" ]; then
                echo "FATAL: API still serving stale commit after restart"
                exit 1
              fi
              echo "API restarted successfully: $RUNNING_COMMIT"
            else
              echo "API version matches: $RUNNING_COMMIT"
            fi

            echo "✅ Test Deployment Complete."
